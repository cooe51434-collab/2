<!DOCTYPE html>
<html lang="ka">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Anano</title>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Noto+Sans+Georgian:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
                display: flex;
                    align-items: center;
                        justify-content: center;
                            font-family: 'Noto Sans Georgian', sans-serif;
                                overflow: hidden;
                                    position: relative;
                                      }

                                        /* ფონი ბუშტებით, რომელიც გინდოდა */
                                          .bg-image {
                                              position: fixed;
                                                  top: 0; left: 0; width: 100%; height: 100%;
                                                      background-image: url('https://i.postimg.cc/mD8zMxfP/9803.jpg'); /* აქ ის სურათია, რაც შავად გქონდა მონიშნული */
                                                          background-size: cover;
                                                              background-position: center;
                                                                  opacity: 0.35; /* ცოტა დავაბნელოთ, რომ კონვერტი კარგად გამოჩნდეს */
                                                                      z-index: -1;
                                                                        }

                                                                          /* ანიმაციური ნაწილაკები (ბრჭყვიალები) */
                                                                            .particle { position: fixed; pointer-events: none; z-index: 0; animation: drift linear infinite; opacity: 0; }
                                                                              @keyframes drift {
                                                                                  0%   { opacity: 0; transform: translateY(100vh) rotate(0deg); }
                                                                                      10%  { opacity: .6; }
                                                                                          90%  { opacity: .5; }
                                                                                              100% { opacity: 0; transform: translateY(-10vh) rotate(360deg); }
                                                                                                }

                                                                                                  .scene { position: relative; display: flex; align-items: center; justify-content: center; z-index: 1; padding-bottom: 70px; }

                                                                                                    /* ლამაზი ფუნფულა დათუნია */
                                                                                                      .bear-side {
                                                                                                          position: absolute;
                                                                                                              bottom: 20px;
                                                                                                                  right: 20px;
                                                                                                                      width: 130px; /* ზომა */
                                                                                                                          z-index: 10;
                                                                                                                              animation: bearFloat 2s ease-in-out infinite; /* ანიმაცია */
                                                                                                                                  pointer-events: none;
                                                                                                                                    }
                                                                                                                                      @keyframes bearFloat {
                                                                                                                                          0%, 100% { transform: translateY(0px) rotate(-3deg); }
                                                                                                                                              50% { transform: translateY(-8px) rotate(3deg); }
                                                                                                                                                }

                                                                                                                                                  .envelope-wrap { position: relative; width: 320px; height: 210px; cursor: pointer; perspective: 1200px; }

                                                                                                                                                    .inner-card {
                                                                                                                                                        position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%) translateY(0px);
                                                                                                                                                            width: 270px; background: white; border-radius: 12px; border: 1.5px solid #d4af37;
                                                                                                                                                                padding: 18px; text-align: center; box-shadow: 0 8px 25px rgba(0,0,0,.5);
                                                                                                                                                                    z-index: 1; opacity: 0; pointer-events: none; transition: transform .8s cubic-bezier(.34,1.15,.64,1), opacity .4s;
                                                                                                                                                                      }
                                                                                                                                                                        .envelope-wrap.open .inner-card { transform: translateX(-50%) translateY(-210px); opacity: 1; pointer-events: auto; }

                                                                                                                                                                          .card-title { font-family: 'Pacifico', cursive; color: #e91e63; margin-bottom: 8px; font-size: 20px; }
                                                                                                                                                                            .card-msg { font-size: 13px; color: #333; line-height: 1.5; font-weight: 700; }

                                                                                                                                                                              .env-body {
                                                                                                                                                                                  position: absolute; bottom: 0; left: 0; width: 100%; height: 180px;
                                                                                                                                                                                      background: #222; border: 2px solid #d4af37; border-radius: 8px; overflow: hidden;
                                                                                                                                                                                        }
                                                                                                                                                                                          .env-flap {
                                                                                                                                                                                              position: absolute; top: 30px; left: 0; width: 0; height: 0;
                                                                                                                                                                                                  border-left: 160px solid transparent; border-right: 160px solid transparent;
                                                                                                                                                                                                      border-top: 100px solid #333; z-index: 5; transform-origin: top center; transition: transform .8s;
                                                                                                                                                                                                        }
                                                                                                                                                                                                          .envelope-wrap.open .env-flap { transform: rotateX(-180deg); }
                                                                                                                                                                                                            .env-seal {
                                                                                                                                                                                                                position: absolute; top: 100px; left: 50%; transform: translateX(-50%);
                                                                                                                                                                                                                    width: 45px; height: 45px; border-radius: 50%; background: #d4af37;
                                                                                                                                                                                                                        display: flex; align-items: center; justify-content: center; font-size: 18px; z-index: 6;
                                                                                                                                                                                                                          }
                                                                                                                                                                                                                            .envelope-wrap.open .env-seal { opacity: 0; }
                                                                                                                                                                                                                              
                                                                                                                                                                                                                                .hint { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); color: #d4af37; font-size: 9px; font-weight: bold; animation: pulse 1.5s infinite; }
                                                                                                                                                                                                                                  @keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
                                                                                                                                                                                                                                  </style>
                                                                                                                                                                                                                                  </head>
                                                                                                                                                                                                                                  <body>

                                                                                                                                                                                                                                  <div class="bg-image"></div>

                                                                                                                                                                                                                                  <img src="https://media1.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHYycHh6ZXB6bm5qZzR3bm8wd3R3Z3R3Z3R3Z3R3Z3R3Z3R3JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/m8fjmY6Ssc90S9tKcN/giphy.gif" alt="ფუნფულა დათუნია" class="bear-side">

                                                                                                                                                                                                                                  <script>
                                                                                                                                                                                                                                  window.addEventListener('DOMContentLoaded', () => {
                                                                                                                                                                                                                                    const chars = ['✦','✧','❤','🌸','★'];
                                                                                                                                                                                                                                      for (let i = 0; i < 20; i++) {
                                                                                                                                                                                                                                          const p = document.createElement('div');
                                                                                                                                                                                                                                              p.className = 'particle';
                                                                                                                                                                                                                                                  p.textContent = chars[Math.floor(Math.random() * chars.length)];
                                                                                                                                                                                                                                                      p.style.left = Math.random()*100 + '%';
                                                                                                                                                                                                                                                          p.style.animationDuration = Math.random()*5+5 + 's';
                                                                                                                                                                                                                                                              document.body.appendChild(p);
                                                                                                                                                                                                                                                                }
                                                                                                                                                                                                                                                                });
                                                                                                                                                                                                                                                                </script>

                                                                                                                                                                                                                                                                <div class="scene">
                                                                                                                                                                                                                                                                  <div class="envelope-wrap" onclick="this.classList.toggle('open')">
                                                                                                                                                                                                                                                                      <div class="inner-card">
                                                                                                                                                                                                                                                                            <div class="card-title">Happy Birthday! 🎉</div>
                                                                                                                                                                                                                                                                                  <div class="card-msg">
                                                                                                                                                                                                                                                                                          <strong style="color: #e91e63;">ანანო</strong>, გილოცავ დაბადების დღეს!<br>
                                                                                                                                                                                                                                                                                                  ღმერთმა ჯანმრთელად და ბედნიერად გამყოფოს მუდამ. ❤️
                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                <div class="env-body"></div>
                                                                                                                                                                                                                                                                                                                    <div class="env-flap"></div>
                                                                                                                                                                                                                                                                                                                        <div class="env-seal">🎁</div>
                                                                                                                                                                                                                                                                                                                            <div class="hint">დააჭირე გასახსნელად</div>
                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                              </div>

                                                                                                                                                                                                                                                                                                                              </body>
                                                                                                                                                                                                                                                                                                                              </html>
